name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    # Logic (trusted-commenter/@claude gate, review-capable tools — including
    # mcp__github_inline_comment__create_inline_comment for inline suggested edits,
    # previously missing) now lives in the shared reusable workflow so it isn't
    # duplicated (and doesn't drift) across every s3ntin3l8 repo. See
    # s3ntin3l8/.github's .github/workflows/claude-code.yml and s3ntin3l8/.github#34.
    permissions:
      contents: read
      pull-requests: write # write: gh pr review + inline comments need this, not just read
      issues: read
      id-token: write
      actions: read # Required for Claude to read CI results on PRs
    uses: s3ntin3l8/.github/.github/workflows/claude-code.yml@main
    secrets: inherit # pragma: allowlist secret
