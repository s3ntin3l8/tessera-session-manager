name: Release Please

on:
  push:
    branches:
      - main

jobs:
  release-please:
    permissions:
      contents: write
      pull-requests: write
    uses: s3ntin3l8/.github/.github/workflows/release-please.yml@main

  build-docker:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    permissions:
      contents: read
      packages: write
      id-token: write
    uses: s3ntin3l8/.github/.github/workflows/docker-publish.yml@main
    with:
      image-name: "s3ntin3l8/${{ github.event.repository.name }}"
      push-release: true
      release-tag: ${{ needs.release-please.outputs.tag_name }}
    secrets: inherit # pragma: allowlist secret

  # Builds and attaches the versioned-release tarball (see deploy/README.md
  # and src/services/update-checker.ts) that self-update.sh downloads and
  # installs. This is a real multi-step job rather than a call into
  # s3ntin3l8/.github's reusable workflows, unlike every other job in this
  # file — a deliberate, deployment-target-specific exception to this repo's
  # normal "thin caller" CI convention (there's no reusable "build a tarball
  # and upload it to a release" workflow upstream, and this artifact only
  # exists for this repo's own native-host deploy path, not something other
  # repos in the org would share).
  #
  # NOT triggered via `on: release: published` — GitHub does not fire that
  # event for a release created by the default GITHUB_TOKEN (the anti-
  # recursion rule release-please itself relies on), so that trigger would
  # simply never run. Gating on release-please's own `release_created`
  # output, exactly like build-docker above, is the only shape that works.
  build-tarball:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ github.token }}
      VERSION: ${{ needs.release-please.outputs.tag_name }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - uses: actions/setup-node@v4
        with:
          node-version: "26"
          cache: "npm"

      - name: Build backend
        run: |
          npm ci
          npm run build

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Assemble release tarball
        run: |
          set -euo pipefail
          # Strip the leading "v" release-please's tag carries — matches the
          # bare MAJOR.MINOR.PATCH package.json's own "version" field uses
          # (see src/services/update-checker.ts's parseVersion).
          version="${VERSION#v}"
          # Staged so self-update.sh's `tar -xzf ... -C "$RELEASE_DIR"` lands
          # dist/, frontend/dist/, drizzle/, scripts/, package.json directly
          # under the release dir — the same layout src/plugins/env.ts's
          # cwd-relative defaults (FRONTEND_DIST=./frontend/dist,
          # drizzle/ via path.resolve("drizzle")) expect when
          # WorkingDirectory is that release dir. Built outside the repo
          # checkout (../staging) so it's never itself picked up by a later
          # `cp -r`, and tarred with `-C staging .` (no wrapping directory)
          # rather than `tar -czf x.tgz staging/` (which would nest
          # everything one level too deep on extraction).
          staging="../staging"
          rm -rf "$staging" && mkdir -p "$staging/frontend"
          cp -r dist "$staging/dist"
          cp -r frontend/dist "$staging/frontend/dist"
          cp -r drizzle "$staging/drizzle"
          cp -r scripts "$staging/scripts"
          cp package.json package-lock.json "$staging/"
          tar -czf "tessera-${version}.tgz" -C "$staging" .
          # Checksum the tarball as its own asset — self-update.sh and
          # deploy/install.sh both verify against this before extracting
          # (Hermes review, PR #54: "no integrity verification of the
          # downloaded tarball"). Standard sha256sum output format
          # ("<hex>  <filename>") so `sha256sum -c` can verify it directly.
          sha256sum "tessera-${version}.tgz" > "tessera-${version}.tgz.sha256"

      - name: Upload tarball and checksum to the GitHub Release
        run: |
          version="${VERSION#v}"
          gh release upload "${{ needs.release-please.outputs.tag_name }}" \
            "tessera-${version}.tgz" "tessera-${version}.tgz.sha256"
