name: CI/CD

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test-node:
    permissions:
      contents: read
    uses: s3ntin3l8/.github/.github/workflows/ci-node.yml@main
    with:
      node-version: "26"
      typecheck-script: "typecheck"
      format-check-script: "format:check"
      test-script: "test:coverage"
      # Line coverage is at ~92% as of M5 (see plan) — 80 is a real floor with
      # headroom to add code without CI being fragile, not a cosmetic bump
      # off the template's starter 0.
      coverage-fail-under: "80"
      strict-checks: true
    secrets: inherit # pragma: allowlist secret

  test-frontend:
    permissions:
      contents: read
    uses: s3ntin3l8/.github/.github/workflows/ci-node.yml@main
    with:
      node-version: "26"
      working-directory: "frontend"
      cache-dependency-path: "frontend/package-lock.json"
      typecheck-script: "typecheck"
      test-script: "test"
      strict-checks: true
    secrets: inherit # pragma: allowlist secret

  build-docker:
    if: github.event_name == 'push'
    needs: [test-node, test-frontend]
    permissions:
      contents: read
      packages: write
      id-token: write
    uses: s3ntin3l8/.github/.github/workflows/docker-publish.yml@main
    with:
      image-name: "s3ntin3l8/${{ github.event.repository.name }}"
      push-edge: true
    secrets: inherit # pragma: allowlist secret
