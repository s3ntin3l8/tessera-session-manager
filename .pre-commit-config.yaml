repos:
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ["--baseline", ".secrets.baseline"]

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-merge-conflict

  - repo: local
    hooks:
      - id: npm-lint
        name: eslint (backend)
        entry: npm run lint
        language: system
        types: [ts, tsx, javascript, jsx]
        pass_filenames: false
        stages: [pre-commit]

      - id: npm-lint-frontend
        name: eslint (frontend)
        entry: npm --prefix frontend run lint
        language: system
        types: [ts, tsx, javascript, jsx]
        pass_filenames: false
        stages: [pre-commit]

      - id: npm-typecheck
        name: typecheck
        entry: npm run typecheck
        language: system
        types: [ts, tsx]
        pass_filenames: false
        stages: [pre-push]

      - id: npm-format-check
        name: prettier (format check)
        entry: npm run format:check
        language: system
        pass_filenames: false
        stages: [pre-push]

      - id: npm-test
        name: vitest (unit tests)
        entry: npm run test
        language: system
        types: [ts, tsx, javascript, jsx]
        pass_filenames: false
        stages: [pre-push]
